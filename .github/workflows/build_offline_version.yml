name: Build offline version

on:
  workflow_dispatch:
    inputs:
      source_branch:
        description: 'Source code branch to build'
        required: true
        type: string
        default: 'main'

jobs:
  build:
    strategy:
      matrix:
        include:
          - platform: 'ubuntu-latest'
          - platform: 'macos-latest'
    runs-on: ${{ matrix.platform }}
    steps:
      - name: Check out the specified branch of this repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.source_branch }}
      - name: Install Node.js and NPM
        uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install dependencies
        run: |
          npm ci
      - name: Build (necessary for the offline html version)
        run: |
          npm run build
      - name: Build offline version
        run: |
          npm run build-offline
      - name: Package
        run: |
          npm run package
      - name: Bundle and compress win32-ia32 build
        if: ${{ matrix.platform == 'ubuntu-latest' }}
        run: |
          7z a -t7z -m0=lzma2 -mx=9 slarmoosbox-win32-ia32.7z ./slarmoosbox-win32-ia32/*
      - name: Bundle and compress win32-x64 build
        if: ${{ matrix.platform == 'ubuntu-latest' }}
        run: |
          7z a -t7z -m0=lzma2 -mx=9 slarmoosbox-win32-x64.7z ./slarmoosbox-win32-x64/*
      - name: Bundle and compress darwin-x64 build
        if: ${{ matrix.platform == 'ubuntu-latest' }}
        run: |
          7z a -t7z -m0=lzma2 -mx=9 slarmoosbox-darwin-x64.7z ./slarmoosbox-darwin-x64/*
      - name: Bundle and compress darwin-arm64 build
        if: ${{ matrix.platform == 'macos-latest' }}
        run: |
          7z a -t7z -m0=lzma2 -mx=9 slarmoosbox-darwin-arm64.7z ./slarmoosbox-darwin-arm64/*
      - name: Bundle and compress linux-x64 build
        if: ${{ matrix.platform == 'ubuntu-latest' }}
        run: |
          7z a -t7z -m0=lzma2 -mx=9 slarmoosbox-linux-x64.7z ./slarmoosbox-linux-x64/*
      - name: Make artifact for win32-ia32 build
        if: ${{ matrix.platform == 'ubuntu-latest' }}
        uses: actions/upload-artifact@v4
        with:
          name: slarmoosbox-win32-ia32
          path: ./slarmoosbox-win32-ia32.7z
          compression-level: 0
      - name: Make artifact for win32-x64 build
        if: ${{ matrix.platform == 'ubuntu-latest' }}
        uses: actions/upload-artifact@v4
        with:
          name: slarmoosbox-win32-x64
          path: ./slarmoosbox-win32-x64.7z
          compression-level: 0
      - name: Make artifact for darwin-x64 build
        if: ${{ matrix.platform == 'ubuntu-latest' }}
        uses: actions/upload-artifact@v4
        with:
          name: slarmoosbox-darwin-x64
          path: ./slarmoosbox-darwin-x64.7z
          compression-level: 0
      - name: Make artifact for darwin-arm64 build
        if: ${{ matrix.platform == 'macos-latest' }}
        uses: actions/upload-artifact@v4
        with:
          name: slarmoosbox-darwin-arm64
          path: ./slarmoosbox-darwin-arm64.7z
          compression-level: 0
      - name: Make artifact for linux-x64 build
        if: ${{ matrix.platform == 'ubuntu-latest' }}
        uses: actions/upload-artifact@v4
        with:
          name: slarmoosbox-linux-x64
          path: ./slarmoosbox-linux-x64.7z
          compression-level: 0
      - name: Make artifact for html build
        if: ${{ matrix.platform == 'ubuntu-latest' }}
        uses: actions/upload-artifact@v4
        with:
          name: slarmoosbox-html
          path: ./to_deploy/slarmoosbox_offline_HTML.html
          compression-level: 0
